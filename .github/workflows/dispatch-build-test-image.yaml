name: Build & Publish testing pulsar image

on:
  workflow_dispatch:
    inputs:
      pulsar_image:
        description: pulsar image
        required: true
      pulsar_tag:
        description: pulsar tag
        required: true
      publish_image:
        description: publish image
        required: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build
        run: ./gradlew assemble
      - name: Extract project version
        run: echo "version=$(./gradlew properties -q | grep '^version:' | awk '{print $2}')" >> $GITHUB_OUTPUT
        id: version
      - uses: docker/setup-qemu-action@v2
      - uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/x86_64,linux/arm64
          push: true
          file: ./.ci/Dockerfile
          tags: ${{ github.event.inputs.publish_image }}:${{ github.event.inputs.pulsar_tag }}-oxia-${{ steps.version.outputs.version }}
          build-args: |
              PULSAR_FQ_IMAGE=${{ github.event.inputs.pulsar_image }}:${{ github.event.inputs.pulsar_tag }}
              OXIA_VERSION=${{ steps.version.outputs.version }}
